<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Places 2 Go" />
  <title>Places 2 Go 💕</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d1a; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .suggestion-enter { animation: fadeUp 0.4s ease forwards; }
    .shimmer { animation: pulse 1.5s ease infinite; }
    input::placeholder { color: #4b4b6a; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const OPEN_METEO_URL = "https://api.open-meteo.com/v1/forecast";
    const LAT = 42.707;
    const LON = -71.163;

    const initialPlaces = [
      { id: 1, name: "603 BBQ", location: "Concord, NH", visited: false, category: "food", notes: "", onList: true },
      { id: 2, name: "Big Pig", location: "Ipswich, MA", visited: true, category: "food", notes: "Already been! ✓", onList: true },
      { id: 3, name: "Harpoon Brewery", location: "Manchester, NH", visited: false, category: "brewery", notes: "❤️ Top pick!", favorite: true, onList: true },
      { id: 4, name: "Anchor Pub & Grille", location: "Beverly, MA", visited: false, category: "bar", notes: "", onList: true },
      { id: 5, name: "Nantasket Beach", location: "Hull, MA", visited: false, category: "outdoor", notes: "", onList: true },
      { id: 6, name: "Humarock Beach", location: "Scituate, MA", visited: false, category: "outdoor", notes: "", onList: true },
      { id: 7, name: "Tuckaway Tavern", location: "Raymond, NH", visited: false, category: "bar", notes: "", onList: true },
      { id: 8, name: "Grace's Bar & Grill", location: "Salisbury, MA", visited: false, category: "bar", notes: "", onList: true },
      { id: 9, name: "Ricochet Pizza", location: "Derry, NH", visited: false, category: "food", notes: "", onList: true },
      { id: 10, name: "Rusty Can", location: "Byfield, MA", visited: false, category: "bar", notes: "", onList: true },
      { id: 11, name: "Carmine", location: "Newburyport, MA", visited: false, category: "food", notes: "", onList: true },
    ];

    const WMO_CODES = {
      0: { label: "Clear sky", emoji: "☀️" }, 1: { label: "Mainly clear", emoji: "🌤️" },
      2: { label: "Partly cloudy", emoji: "⛅" }, 3: { label: "Overcast", emoji: "☁️" },
      45: { label: "Foggy", emoji: "🌫️" }, 48: { label: "Icy fog", emoji: "🌫️" },
      51: { label: "Light drizzle", emoji: "🌦️" }, 53: { label: "Drizzle", emoji: "🌦️" },
      55: { label: "Heavy drizzle", emoji: "🌧️" }, 61: { label: "Light rain", emoji: "🌧️" },
      63: { label: "Rain", emoji: "🌧️" }, 65: { label: "Heavy rain", emoji: "🌧️" },
      71: { label: "Light snow", emoji: "🌨️" }, 73: { label: "Snow", emoji: "❄️" },
      75: { label: "Heavy snow", emoji: "❄️" }, 80: { label: "Rain showers", emoji: "🌦️" },
      81: { label: "Rain showers", emoji: "🌧️" }, 82: { label: "Heavy showers", emoji: "⛈️" },
      95: { label: "Thunderstorm", emoji: "⛈️" }, 99: { label: "Thunderstorm", emoji: "⛈️" },
    };

    const categoryColors = { food: "#f59e0b", brewery: "#8b5cf6", bar: "#3b82f6", outdoor: "#10b981" };
    const categoryEmoji = { food: "🍽️", brewery: "🍺", bar: "🥃", outdoor: "🌊" };

    const card = {
      background: "rgba(255,255,255,0.05)",
      border: "1px solid rgba(255,255,255,0.08)",
      borderRadius: 16, padding: "16px 18px", marginBottom: 12,
    };

    function WeatherCard({ weather, onRefresh, loading }) {
      if (loading) return (
        <div style={{ ...card, display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ fontSize: 32, animation: "spin 2s linear infinite" }}>🔄</div>
          <div style={{ color: "#93c5fd", fontSize: 14 }}>Fetching live weather…</div>
        </div>
      );
      if (!weather) return null;
      const wmo = WMO_CODES[weather.weathercode] || { label: "Unknown", emoji: "🌡️" };
      const tempF = Math.round(weather.temperature * 9 / 5 + 32);
      const windMph = Math.round(weather.windspeed * 0.621371);
      const isWindy = windMph > 15;
      const isCold = tempF < 45;
      const isRainy = [51,53,55,61,63,65,80,81,82,95,99].includes(weather.weathercode);
      const isNice = !isRainy && tempF >= 60 && !isWindy;
      return (
        <div style={{
          ...card,
          background: isNice
            ? "linear-gradient(135deg, rgba(16,185,129,0.2), rgba(6,182,212,0.15))"
            : "linear-gradient(135deg, rgba(59,130,246,0.2), rgba(99,102,241,0.1))",
          border: isNice ? "1px solid rgba(16,185,129,0.3)" : "1px solid rgba(99,102,241,0.3)",
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 42 }}>{wmo.emoji}</div>
              <div>
                <div style={{ fontSize: 10, color: "#93c5fd", fontWeight: 600, letterSpacing: 2, textTransform: "uppercase", marginBottom: 2 }}>Lawrence, MA · Live</div>
                <div style={{ fontSize: 26, fontWeight: 800, color: "#fff" }}>{tempF}°F</div>
                <div style={{ fontSize: 13, color: "#c4b5fd" }}>{wmo.label}</div>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 6 }}>💨 {windMph} mph<br />💧 {weather.humidity}%</div>
              <button onClick={onRefresh} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8, padding: "5px 10px", color: "#a78bfa", fontSize: 11, cursor: "pointer" }}>↻ Refresh</button>
            </div>
          </div>
          {(isWindy || isCold || isRainy) && (
            <div style={{ marginTop: 10, padding: "8px 12px", background: "rgba(239,68,68,0.12)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 10, fontSize: 12, color: "#fca5a5" }}>
              {isWindy && "⚠️ Windy — outdoor spots may be rough. "}{isCold && "🧥 Bundle up! "}{isRainy && "☔ Rain — lean indoor."}
            </div>
          )}
          {isNice && (
            <div style={{ marginTop: 10, padding: "8px 12px", background: "rgba(16,185,129,0.12)", border: "1px solid rgba(16,185,129,0.2)", borderRadius: 10, fontSize: 12, color: "#6ee7b7" }}>
              ✨ Perfect weather — outdoor spots are a great call today!
            </div>
          )}
        </div>
      );
    }

    function SuggestionCard({ suggestion, index, onAddToList }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div style={{ ...card, borderLeft: index === 0 ? "3px solid #f59e0b" : "3px solid rgba(255,255,255,0.1)", cursor: "pointer" }}
          onClick={() => setExpanded(!expanded)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                {index === 0 && <span style={{ background: "linear-gradient(90deg, #f59e0b, #ef4444)", borderRadius: 20, padding: "1px 8px", fontSize: 9, fontWeight: 800, letterSpacing: 1.5, textTransform: "uppercase", color: "#fff" }}>✦ Top Pick</span>}
                {suggestion.onList && <span style={{ background: "rgba(139,92,246,0.25)", border: "1px solid rgba(139,92,246,0.4)", borderRadius: 20, padding: "1px 8px", fontSize: 9, fontWeight: 700, color: "#c4b5fd" }}>On your list</span>}
              </div>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#fff", lineHeight: 1.2 }}>{suggestion.name}</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 2 }}>{suggestion.location}</div>
            </div>
            <div style={{ fontSize: 22, marginLeft: 10 }}>{suggestion.emoji}</div>
          </div>
          <div style={{ fontSize: 13, color: "#d1d5db", marginTop: 8, lineHeight: 1.6 }}>{suggestion.reason}</div>
          {expanded && suggestion.details && (
            <div style={{ marginTop: 10, padding: "10px 12px", background: "rgba(255,255,255,0.04)", borderRadius: 10, fontSize: 12, color: "#c4b5fd", lineHeight: 1.7 }}>{suggestion.details}</div>
          )}
          <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap", alignItems: "center" }}>
            {[suggestion.vibe, suggestion.drive, suggestion.weatherFit].filter(Boolean).map((tag, i) => (
              <span key={i} style={{ background: "rgba(139,92,246,0.15)", border: "1px solid rgba(139,92,246,0.25)", borderRadius: 20, padding: "3px 9px", fontSize: 11, color: "#c4b5fd" }}>{tag}</span>
            ))}
            <span style={{ marginLeft: "auto", fontSize: 11, color: "#6b7280" }}>{expanded ? "▲ less" : "▼ more"}</span>
          </div>
          {!suggestion.onList && (
            <button onClick={e => { e.stopPropagation(); onAddToList(suggestion); }}
              style={{ marginTop: 10, width: "100%", padding: "8px", background: "rgba(139,92,246,0.15)", border: "1px dashed rgba(139,92,246,0.4)", borderRadius: 10, color: "#a78bfa", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              + Add to your list
            </button>
          )}
        </div>
      );
    }

    function App() {
      const [places, setPlaces] = useState(initialPlaces);
      const [activeTab, setActiveTab] = useState("today");
      const [weather, setWeather] = useState(null);
      const [weatherLoading, setWeatherLoading] = useState(true);
      const [suggestions, setSuggestions] = useState([]);
      const [suggestionsLoading, setSuggestionsLoading] = useState(false);
      const [suggestionsError, setSuggestionsError] = useState(null);
      const [filter, setFilter] = useState("all");
      const [adding, setAdding] = useState(false);
      const [newPlace, setNewPlace] = useState({ name: "", location: "", category: "food" });

      const fetchWeather = useCallback(async () => {
        setWeatherLoading(true);
        try {
          const res = await fetch(`${OPEN_METEO_URL}?latitude=${LAT}&longitude=${LON}&current_weather=true&hourly=relativehumidity_2m&temperature_unit=celsius&windspeed_unit=kmh&timezone=America%2FNew_York`);
          const data = await res.json();
          const cw = data.current_weather;
          const idx = data.hourly.time.findIndex(t => t === cw.time.slice(0, 13) + ":00");
          setWeather({ ...cw, humidity: idx >= 0 ? data.hourly.relativehumidity_2m[idx] : 60 });
        } catch (e) { setWeather(null); }
        setWeatherLoading(false);
      }, []);

      const fetchSuggestions = useCallback(async (w) => {
        if (!w) return;
        setSuggestionsLoading(true);
        setSuggestionsError(null);
        const tempF = Math.round(w.temperature * 9 / 5 + 32);
        const windMph = Math.round(w.windspeed * 0.621371);
        const wmo = WMO_CODES[w.weathercode] || { label: "Unknown" };
        const notVisited = places.filter(p => !p.visited);
        const listStr = notVisited.map(p => `- ${p.name} (${p.location}, ${p.category})`).join("\n");
        const prompt = `You're helping plan a romantic date near Lawrence, MA.\n\nCurrent weather: ${tempF}°F, ${wmo.label}, wind ${windMph} mph.\n\nTheir "Places 2 Go" list (not yet visited):\n${listStr}\n\nGive exactly 5 date suggestions. Mix some from their list + NEW creative ideas nearby (NH/MA, within ~1 hour). Consider weather but think variety: food, experiences, outdoor, culture, quirky spots. She likes discovering cool new places.\n\nRespond ONLY with a valid JSON array, no markdown:\n[{"name":"","location":"","emoji":"","reason":"","details":"","vibe":"","drive":"","weatherFit":"","onList":false}]`;
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
          });
          const data = await res.json();
          const text = data.content?.map(b => b.text || "").join("") || "";
          setSuggestions(JSON.parse(text.replace(/```json|```/g, "").trim()));
        } catch (e) { setSuggestionsError("Couldn't load suggestions right now — try refreshing!"); }
        setSuggestionsLoading(false);
      }, [places]);

      useEffect(() => { fetchWeather(); }, [fetchWeather]);
      useEffect(() => { if (weather && suggestions.length === 0) fetchSuggestions(weather); }, [weather]);

      const doRefresh = () => { setSuggestions([]); fetchWeather(); };
      const addToList = (s) => setPlaces(prev => [...prev, { id: Date.now(), name: s.name, location: s.location, visited: false, category: "food", notes: "Added from AI suggestion", onList: true }]);
      const toggleVisited = (id) => setPlaces(prev => prev.map(p => p.id === id ? { ...p, visited: !p.visited } : p));
      const addPlace = () => {
        if (!newPlace.name.trim()) return;
        setPlaces(prev => [...prev, { ...newPlace, id: Date.now(), visited: false, notes: "", onList: true }]);
        setNewPlace({ name: "", location: "", category: "food" });
        setAdding(false);
      };

      const visited = places.filter(p => p.visited);
      const notVisited = places.filter(p => !p.visited);
      const filtered = filter === "all" ? notVisited : notVisited.filter(p => p.category === filter);

      const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: 14, marginBottom: 8, fontFamily: "inherit" };

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0d0d1a 0%, #1a1035 40%, #0d1a2e 100%)", fontFamily: "'Palatino Linotype', Palatino, serif", color: "#fff", paddingBottom: 80 }}>

          {/* Header */}
          <div style={{ padding: "36px 22px 0", textAlign: "center" }}>
            <div style={{ fontSize: 10, letterSpacing: 6, color: "#7c6fa0", textTransform: "uppercase", marginBottom: 10 }}>Your Adventure Log</div>
            <h1 style={{ fontSize: 34, fontWeight: 700, margin: 0, background: "linear-gradient(100deg, #f9a8d4 0%, #c084fc 50%, #7dd3fc 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Places 2 Go 💕</h1>
            <div style={{ marginTop: 10, display: "flex", justifyContent: "center", gap: 18, fontSize: 12 }}>
              <span style={{ color: "#6ee7b7" }}>✅ {visited.length} visited</span>
              <span style={{ color: "#4b4b6a" }}>·</span>
              <span style={{ color: "#c4b5fd" }}>📍 {notVisited.length} to explore</span>
            </div>
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", margin: "22px 16px 0", background: "rgba(255,255,255,0.05)", borderRadius: 14, padding: 3, gap: 2 }}>
            {[{ key: "today", label: "✦ Today" }, { key: "list", label: "🗺️ List" }, { key: "visited", label: "✅ Done" }].map(tab => (
              <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{ flex: 1, padding: "11px 4px", borderRadius: 12, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 700, background: activeTab === tab.key ? "linear-gradient(135deg, #7c3aed, #4f46e5)" : "transparent", color: activeTab === tab.key ? "#fff" : "#6b6b8a" }}>{tab.label}</button>
            ))}
          </div>

          {/* TODAY */}
          {activeTab === "today" && (
            <div style={{ padding: "18px 16px 0" }}>
              <WeatherCard weather={weather} onRefresh={doRefresh} loading={weatherLoading} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                <div style={{ fontSize: 10, letterSpacing: 4, color: "#7c6fa0", textTransform: "uppercase" }}>✦ Date Ideas For Today</div>
                {!suggestionsLoading && weather && (
                  <button onClick={() => { setSuggestions([]); fetchSuggestions(weather); }} style={{ background: "rgba(124,58,237,0.2)", border: "1px solid rgba(124,58,237,0.35)", borderRadius: 8, padding: "4px 10px", color: "#c4b5fd", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>↻ New ideas</button>
                )}
              </div>
              {suggestionsLoading && (
                <div style={{ ...card, textAlign: "center", padding: "28px 16px" }}>
                  <div className="shimmer" style={{ fontSize: 28, marginBottom: 8 }}>✨</div>
                  <div style={{ color: "#9ca3af", fontSize: 13 }}>Claude is thinking up date ideas<br />based on today's weather…</div>
                  {[1,2,3].map(i => <div key={i} className="shimmer" style={{ height: 12, borderRadius: 8, background: "rgba(255,255,255,0.07)", marginTop: 12, width: i === 3 ? "60%" : "100%", marginLeft: i === 3 ? "auto" : 0, marginRight: i === 3 ? "auto" : 0 }} />)}
                </div>
              )}
              {suggestionsError && <div style={{ ...card, textAlign: "center", border: "1px solid rgba(239,68,68,0.2)", color: "#fca5a5", fontSize: 13 }}>{suggestionsError}</div>}
              {!suggestionsLoading && suggestions.map((s, i) => (
                <div key={i} className="suggestion-enter" style={{ animationDelay: `${i * 0.08}s` }}>
                  <SuggestionCard suggestion={s} index={i} onAddToList={addToList} />
                </div>
              ))}
            </div>
          )}

          {/* LIST */}
          {activeTab === "list" && (
            <div style={{ padding: "18px 16px 0" }}>
              <div style={{ display: "flex", gap: 7, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
                {["all", "food", "brewery", "bar", "outdoor"].map(f => (
                  <button key={f} onClick={() => setFilter(f)} style={{ padding: "6px 13px", borderRadius: 20, border: "1px solid rgba(255,255,255,0.12)", background: filter === f ? (categoryColors[f] || "#7c3aed") : "transparent", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                    {f === "all" ? "All" : `${categoryEmoji[f]} ${f}`}
                  </button>
                ))}
              </div>
              {filtered.map(place => (
                <div key={place.id} style={{ ...card, borderLeft: `3px solid ${categoryColors[place.category] || "#6b7280"}`, display: "flex", alignItems: "center", gap: 12 }}>
                  <button onClick={() => toggleVisited(place.id)} style={{ width: 28, height: 28, borderRadius: "50%", border: "2px solid rgba(255,255,255,0.25)", background: "transparent", cursor: "pointer", flexShrink: 0, fontSize: 16, color: "#6b7280" }}>○</button>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "#fff" }}>{place.name} {place.favorite ? "❤️" : ""}</div>
                    <div style={{ fontSize: 12, color: "#6b7280" }}>{place.location}</div>
                    {place.notes && <div style={{ fontSize: 11, color: "#a78bfa", marginTop: 2 }}>{place.notes}</div>}
                  </div>
                  <span style={{ fontSize: 16 }}>{categoryEmoji[place.category]}</span>
                </div>
              ))}
              {!adding ? (
                <button onClick={() => setAdding(true)} style={{ width: "100%", padding: "14px", background: "rgba(124,58,237,0.1)", border: "2px dashed rgba(124,58,237,0.35)", borderRadius: 14, color: "#a78bfa", fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>+ Add a place</button>
              ) : (
                <div style={{ ...card, border: "1px solid rgba(124,58,237,0.4)", marginTop: 4 }}>
                  <input placeholder="Place name" value={newPlace.name} onChange={e => setNewPlace({ ...newPlace, name: e.target.value })} style={inputStyle} />
                  <input placeholder="City, State" value={newPlace.location} onChange={e => setNewPlace({ ...newPlace, location: e.target.value })} style={inputStyle} />
                  <select value={newPlace.category} onChange={e => setNewPlace({ ...newPlace, category: e.target.value })} style={{ ...inputStyle, background: "#12102a", marginBottom: 12 }}>
                    <option value="food">🍽️ Food</option>
                    <option value="brewery">🍺 Brewery</option>
                    <option value="bar">🥃 Bar</option>
                    <option value="outdoor">🌊 Outdoor</option>
                  </select>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={addPlace} style={{ flex: 1, padding: "10px", background: "linear-gradient(135deg, #7c3aed, #4f46e5)", border: "none", borderRadius: 10, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Add</button>
                    <button onClick={() => setAdding(false)} style={{ flex: 1, padding: "10px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, color: "#6b7280", fontSize: 14, cursor: "pointer" }}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* VISITED */}
          {activeTab === "visited" && (
            <div style={{ padding: "18px 16px 0" }}>
              <div style={{ fontSize: 10, letterSpacing: 4, color: "#7c6fa0", textTransform: "uppercase", marginBottom: 14 }}>Places explored together</div>
              {visited.length === 0 ? (
                <div style={{ textAlign: "center", padding: "48px 24px", color: "#4b4b6a" }}>
                  <div style={{ fontSize: 36, marginBottom: 12 }}>🗺️</div>
                  <div style={{ fontSize: 15 }}>No visits logged yet</div>
                  <div style={{ fontSize: 13, marginTop: 6 }}>Tap ○ on any place to check it off!</div>
                </div>
              ) : visited.map(place => (
                <div key={place.id} style={{ ...card, background: "rgba(16,185,129,0.06)", border: "1px solid rgba(16,185,129,0.15)", display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 20 }}>✅</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, textDecoration: "line-through", color: "#6b7280" }}>{place.name}</div>
                    <div style={{ fontSize: 12, color: "#4ade80", marginTop: 2 }}>{place.location}</div>
                  </div>
                  <button onClick={() => toggleVisited(place.id)} style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.25)", borderRadius: 8, padding: "4px 10px", color: "#fca5a5", fontSize: 11, cursor: "pointer" }}>Undo</button>
                </div>
              ))}
              {visited.length > 0 && (
                <div style={{ ...card, textAlign: "center", marginTop: 12 }}>
                  <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 10 }}>{visited.length} of {places.length} places explored 💕</div>
                  <div style={{ height: 8, borderRadius: 10, background: "rgba(255,255,255,0.07)", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(visited.length / places.length) * 100}%`, background: "linear-gradient(90deg, #7c3aed, #ec4899, #f59e0b)", borderRadius: 10, transition: "width 0.5s ease" }} />
                  </div>
                  <div style={{ fontSize: 11, color: "#4b4b6a", marginTop: 8 }}>{Math.round((visited.length / places.length) * 100)}% of the adventure complete</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
